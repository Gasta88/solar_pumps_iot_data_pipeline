##############################################################################
# Solar Pumps IoT Data Pipeline - Docker Compose
# All infrastructure services for the real-time IoT data pipeline.
##############################################################################

services:
  # ---------- Message Broker ----------
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: solar-rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-iot_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-changeme_rabbitmq}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------- Time-Series Database ----------
  timescaledb:
    image: timescale/timescaledb:2.13.1-pg15
    container_name: solar-timescaledb
    hostname: timescaledb
    ports:
      - "${TIMESCALEDB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-iot_data}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./config/timescaledb/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot_user} -d ${POSTGRES_DB:-iot_data}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------- Monitoring: Prometheus ----------
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: solar-prometheus
    hostname: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------- Monitoring: Grafana ----------
  grafana:
    image: grafana/grafana:10.2.3
    container_name: solar-grafana
    hostname: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/system-health.json"
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------- Stream Processing: Flink JobManager ----------
  flink-jobmanager:
    image: flink:1.18-java11
    container_name: solar-flink-jobmanager
    hostname: flink-jobmanager
    ports:
      - "${FLINK_JOBMANAGER_PORT:-8081}:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 1024m
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-iot_user}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-changeme_rabbitmq}
      TIMESCALEDB_JDBC_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-iot_data}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    volumes:
      - flink_data:/opt/flink/data
      - ./flink-jobs/telemetry-processor/target:/opt/flink/job-jars:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8081/overview > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------- Stream Processing: Flink TaskManager ----------
  flink-taskmanager:
    image: flink:1.18-java11
    container_name: solar-flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.memory.process.size: 1024m
        taskmanager.numberOfTaskSlots: 2
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-iot_user}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-changeme_rabbitmq}
      TIMESCALEDB_JDBC_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-iot_data}
      POSTGRES_USER: ${POSTGRES_USER:-iot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://flink-jobmanager:8081/taskmanagers | grep -q '\"taskmanagers\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ---------- Exporter: RabbitMQ ----------
  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:1.0.0-RC19
    container_name: solar-rabbitmq-exporter
    hostname: rabbitmq-exporter
    environment:
      RABBIT_URL: "http://rabbitmq:15672"
      RABBIT_USER: ${RABBITMQ_DEFAULT_USER:-iot_user}
      RABBIT_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-changeme_rabbitmq}
      PUBLISH_PORT: "9419"
      OUTPUT_FORMAT: "prometheus"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - iot-network
    restart: unless-stopped

  # ---------- Exporter: PostgreSQL / TimescaleDB ----------
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: solar-postgres-exporter
    hostname: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-iot_user}:${POSTGRES_PASSWORD:-changeme_postgres}@timescaledb:5432/${POSTGRES_DB:-iot_data}?sslmode=disable"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - iot-network
    restart: unless-stopped

  # ---------- IoT Simulator ----------
  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: solar-simulator
    hostname: simulator
    ports:
      - "${SIMULATOR_METRICS_PORT:-8001}:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-iot_user}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-changeme_rabbitmq}
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

# ---------- Docker Networks ----------
networks:
  iot-network:
    driver: bridge
    name: solar-iot-network

# ---------- Docker Volumes ----------
volumes:
  rabbitmq_data:
    driver: local
  timescaledb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  flink_data:
    driver: local
