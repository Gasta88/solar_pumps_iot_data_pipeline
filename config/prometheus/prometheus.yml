global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ---------- Internal ----------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # ---------- Application ----------
  - job_name: "simulator"
    static_configs:
      - targets: ["simulator:8001"]

  - job_name: "flink"
    static_configs:
      - targets: ["flink-jobmanager:9249", "flink-taskmanager:9249"]

  # ---------- Exporters ----------
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq-exporter:9419"]

  - job_name: "timescaledb"
    static_configs:
      - targets: ["postgres-exporter:9187"]
